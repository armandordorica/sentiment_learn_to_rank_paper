{% if error %}<div class="alert alert-error">{{ error }}</div>{% elif job %}<div class="alert {{ 'alert-success' if job.status == 'done' else 'alert-error' if job.status == 'error' else 'alert-info' }}" {% if job.status in ['pending', 'running'] %}hx-get="/sentiment-lab/train/{{ job.id }}/status" hx-trigger="load delay:2s" hx-swap="outerHTML"{% endif %}><strong>{{ job.status|title }}</strong> — {{ job.progress_message }}{% if job.error %}<pre>{{ job.error }}</pre>{% endif %}{% if job.status == 'done' %}<p>Checkpoint saved. Refresh this page to load the new metrics and enable inference.</p>{% endif %}</div>{% endif %}
